<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusTime Observe</title>
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/index.css">
    <script src="./js/app.js"></script>
</head>

<body>
    <header class="header">
        <p class="subtitle">输入-输出-长期主义</p>
    </header>
    <div class="main">

        <div class="left">

        </div>
        <div class="container">
            <main class="main-content">
                <!-- 数据输入表单 -->
                <section class="input-section">
                    <h2>每日记录</h2>
                    <form id="dailyForm" class="daily-form">
                        <div class="form-group">
                            <label for="date">日期</label>
                            <input type="date" id="date" name="date" required>
                        </div>

                        <div class="form-group">
                            <label for="wakeUpTime">起床时间</label>
                            <input type="time" id="wakeUpTime" name="wakeUpTime">
                        </div>

                        <div class="form-group">
                            <label for="bedTime">睡觉时间</label>
                            <input type="time" id="bedTime" name="bedTime">
                        </div>

                        <div class="form-group">
                            <label for="focusTime">专注时间（小时）</label>
                            <input type="number" id="focusTime" name="focusTime" min="0" max="24" step="0.5"
                                placeholder="例如：6.5">
                        </div>

                        <div class="form-group">
                            <label for="resultDescription">结果描述</label>
                            <textarea id="resultDescription" name="resultDescription" rows="3"
                                placeholder="记录今天的学习成果和感受"></textarea>
                        </div>

                        <div class="form-group checkbox-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="isHoliday" name="isHoliday">
                                <span class="checkmark"></span>
                                是否假期
                            </label>
                        </div>

                        <div class="form-group checkbox-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="isSpecialEvent" name="isSpecialEvent">
                                <span class="checkmark"></span>
                                是否特殊事件
                            </label>
                        </div>

                        <div class="form-group" id="specialEventGroup" style="display: none;">
                            <label for="specialEventDescription">特殊事件描述</label>
                            <textarea id="specialEventDescription" name="specialEventDescription" rows="2"
                                placeholder="描述特殊事件"></textarea>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">保存记录</button>
                            <button type="button" id="clearForm" class="btn btn-secondary">清空表单</button>
                        </div>
                    </form>
                </section>

                <!-- 数据统计 -->
                <section class="stats-section">
                    <h2>数据统计</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>今日专注时间</h3>
                            <p class="stat-value" id="todayFocusTime">0</p>
                            <span class="stat-unit">小时</span>
                        </div>
                        <div class="stat-card">
                            <h3>本周平均专注时间</h3>
                            <p class="stat-value" id="weekAvgFocusTime">0</p>
                            <span class="stat-unit">小时</span>
                        </div>
                        <div class="stat-card">
                            <h3>本月总专注时间</h3>
                            <p class="stat-value" id="monthTotalFocusTime">0</p>
                            <span class="stat-unit">小时</span>
                        </div>
                        <div class="stat-card">
                            <h3>记录天数</h3>
                            <p class="stat-value" id="totalDays">0</p>
                            <span class="stat-unit">天</span>
                        </div>
                    </div>
                </section>

                <!-- 历史记录 -->
                <section class="history-section">
                    <h2>历史记录</h2>
                    <div class="history-controls">
                        <input type="date" id="historyDateFilter" placeholder="选择日期">
                        <button id="filterHistory" class="btn btn-small">筛选</button>
                        <button id="clearFilter" class="btn btn-small">清除筛选</button>
                    </div>
                    <div id="historyList" class="history-list">
                        <!-- 历史记录将在这里动态生成 -->
                    </div>
                </section>
            </main>

            <footer class="footer">
                <p>&copy; feitiandahou Objective observation system for learning status</p>
            </footer>
        </div>
        <div class="right">

        </div>
    </div>
</body>

</html>
